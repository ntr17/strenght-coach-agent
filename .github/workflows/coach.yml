name: Daily Coaching Email

on:
  schedule:
    # 21:00 UTC = 22:00 Spain (CET, winter). Change to 20:00 UTC in summer (CEST).
    - cron: '0 21 * * *'
    # 19:00 UTC = 20:00 Spain — evening session completion nudge
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  run-coach:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google credentials
        env:
          GOOGLE_CREDENTIALS_B64: ${{ secrets.GOOGLE_CREDENTIALS_B64 }}
          GOOGLE_TOKEN_B64: ${{ secrets.GOOGLE_TOKEN_B64 }}
        run: |
          mkdir -p config
          echo "$GOOGLE_CREDENTIALS_B64" | base64 -d > config/credentials.json
          # Note: token.json must include gmail.readonly scope (re-auth locally if needed)
          echo "$GOOGLE_TOKEN_B64" | base64 -d > config/token.json

      - name: Run coach (21:00 UTC) or nudge (19:00 UTC)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROGRAM_SHEET_ID: ${{ secrets.PROGRAM_SHEET_ID }}
          MEMORY_SHEET_ID: ${{ secrets.MEMORY_SHEET_ID }}
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          ATHLETE_NAME: ${{ secrets.ATHLETE_NAME }}
          EMAIL_HOUR: ${{ secrets.EMAIL_HOUR }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "19" ]; then
            echo "19:00 UTC — running session completion nudge..."
            python src/run_coach.py --nudge
          else
            echo "21:00 UTC — running full coaching email..."
            python src/run_coach.py
          fi

      - name: Run strategic planning pass (Sundays only)
        if: github.event_name == 'schedule'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROGRAM_SHEET_ID: ${{ secrets.PROGRAM_SHEET_ID }}
          MEMORY_SHEET_ID: ${{ secrets.MEMORY_SHEET_ID }}
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          ATHLETE_NAME: ${{ secrets.ATHLETE_NAME }}
          PROGRAM_START_DATE: ${{ secrets.PROGRAM_START_DATE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Only run on Sundays (day of week = 7, Mon=1 Sun=7)
          if [ "$(date +%u)" = "7" ]; then
            echo "Sunday — running strategic planning pass..."
            python src/run_coach.py --think
            echo "Sunday — exporting Coach Memory backup..."
            python src/run_coach.py --export
          else
            echo "Not Sunday — skipping planning pass."
          fi
